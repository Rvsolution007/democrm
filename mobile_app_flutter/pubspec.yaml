name: vyaparcrm
description: VyaparCRM Mobile App - Flutter client for VyaparCRM Laravel backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4
  
  # Networking
  dio: ^5.4.1
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Routing
  go_router: ^13.2.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.11

flutter:
  uses-material-design: true
